version: '3.3'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: loans
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5430:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d loans"]
      interval: 5s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    entrypoint: ./setup.sh
    depends_on:
      - db
    volumes:
      # Исходный код
      - ./src:/app/src
      - ./docker/php/setup.sh:/app/setup.sh
      - ./composer.json:/app/composer.json
      - ./phpunit.xml.dist:/app/phpunit.xml.dist
      # Тесты
      - ./tests:/app/tests
      # Vendor с хоста (видно в IDE!)
      - ./vendor:/app/vendor
#      - ./composer.json:/app/composer.json
      # Runtime данные
      - app_runtime:/app/src/runtime
      - app_assets:/app/src/web/assets
    environment:
# dont forget to UPD in phpunit.xml.dist
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: loans
      DB_USER: user
      DB_PASS: password
    working_dir: /app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8380:80"
    depends_on:
      - php
    volumes:
      - ./src:/app/src
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped

volumes:
  pgdata:
  app_runtime:
  app_assets: