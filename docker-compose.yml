version: '3.3'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_EXTERNAL_PORT}:${DB_PORT}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    entrypoint: ./setup.sh
    depends_on:
      - db
    volumes:
      - ./src:/app/src
      - ./docker/php/setup.sh:/app/setup.sh
      - ./composer.json:/app/composer.json
      - ./phpunit.xml.dist:/app/phpunit.xml.dist
      - ./tests:/app/tests
      - ./vendor:/app/vendor
      - app_runtime:/app/src/runtime
      - app_assets:/app/src/web/assets
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    working_dir: /app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - php
    volumes:
      - ./src:/app/src
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped

volumes:
  pgdata:
  app_runtime:
  app_assets: